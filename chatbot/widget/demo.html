<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>DegreeBaba Chatbot Simulator</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #F7F8FA;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
      }

      .scenario-panel {
        width: min(380px, 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
        border: 1px solid #E5E7EB;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(14, 31, 61, 0.04);
        margin-left: 20px;
      }

      .scenario-panel__copy {
        display: grid;
        gap: 4px;
      }

      .scenario-panel__copy strong {
        font-size: 11px;
        color: #E84010;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      .scenario-panel__copy h2 {
        margin: 0;
        font-size: 18px;
        color: #0E1F3D;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .scenario-panel__copy span {
        color: #657083;
        font-size: 12px;
        line-height: 1.4;
      }

      .scenario-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
      }

      .scenario-option {
        position: relative;
        cursor: pointer;
        display: block;
        width: 100%;
      }

      .scenario-option input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .scenario-option__wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #E5E7EB;
        border-radius: 12px;
        background: #ffffff;
        transition: all 150ms ease;
      }

      .scenario-option__indicator {
        display: block;
        width: 18px;
        height: 18px;
        border: 1.5px solid #CBD5E1;
        border-radius: 50%;
        position: relative;
        flex-shrink: 0;
        transition: all 150ms ease;
      }

      .scenario-option__indicator::after {
        content: "";
        position: absolute;
        inset: 4.5px;
        border-radius: 50%;
        background: #E84010;
        transform: scale(0);
        transition: transform 150ms ease;
      }

      .scenario-option__label {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .scenario-option__label strong {
        font-size: 13.5px;
        color: #0E1F3D;
        font-weight: 600;
      }

      .scenario-option__label small {
        font-size: 11px;
        color: #657083;
      }

      /* Hover state */
      .scenario-option:hover .scenario-option__wrapper {
        background: #F9FAFB;
        border-color: #CBD5E1;
      }

      /* Checked state */
      .scenario-option input:checked + .scenario-option__wrapper {
        border-color: rgba(232, 64, 16, 0.3);
        background: rgba(232, 64, 16, 0.04);
      }

      .scenario-option input:checked + .scenario-option__wrapper .scenario-option__indicator {
        border-color: #E84010;
      }

      .scenario-option input:checked + .scenario-option__wrapper .scenario-option__indicator::after {
        transform: scale(1);
      }

      /* Focus state */
      .scenario-option input:focus-visible + .scenario-option__wrapper {
        outline: 3px solid rgba(232, 64, 16, 0.2);
        outline-offset: 2px;
      }

      @media (max-width: 600px) {
        body {
          padding: 16px;
        }
        .scenario-panel {
          width: 100%;
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <aside class="scenario-panel" aria-label="Production widget test scenario">
      <div class="scenario-panel__copy">
        <strong>Testing Controls</strong>
        <h2>Simulated page</h2>
        <span id="scenario-context">Loading production widget context…</span>
      </div>
      <form id="scenario-switcher">
        <fieldset class="scenario-options" aria-label="Choose a page context">
          <legend hidden>Choose a page context</legend>
          <label class="scenario-option">
            <input type="radio" name="scenario" value="homepage" />
            <span class="scenario-option__wrapper">
              <span class="scenario-option__indicator"></span>
              <span class="scenario-option__label">
                <strong>Homepage</strong>
                <small>No catalog context</small>
              </span>
            </span>
          </label>
          <label class="scenario-option">
            <input type="radio" name="scenario" value="university" />
            <span class="scenario-option__wrapper">
              <span class="scenario-option__indicator"></span>
              <span class="scenario-option__label">
                <strong>University</strong>
                <small>University context</small>
              </span>
            </span>
          </label>
          <label class="scenario-option">
            <input type="radio" name="scenario" value="course" />
            <span class="scenario-option__wrapper">
              <span class="scenario-option__indicator"></span>
              <span class="scenario-option__label">
                <strong>Course</strong>
                <small>University + course context</small>
              </span>
            </span>
          </label>
          <label class="scenario-option">
            <input type="radio" name="scenario" value="specialization" />
            <span class="scenario-option__wrapper">
              <span class="scenario-option__indicator"></span>
              <span class="scenario-option__label">
                <strong>Specialization</strong>
                <small>Full catalog context</small>
              </span>
            </span>
          </label>
        </fieldset>
      </form>
    </aside>

    <script>
      (() => {
        const scenarios = {
          homepage: {
            label: "Homepage context",
            dataset: { pageType: "homepage" },
          },
          university: {
            label: "NMIMS university context",
            dataset: {
              pageType: "university",
              pageUniversitySlug: "nmims",
              pageEntitySlug: "nmims-online",
            },
          },
          course: {
            label: "NMIMS Online MCA context",
            dataset: {
              pageType: "course",
              pageUniversitySlug: "nmims",
              pageEntitySlug: "nmims-mca",
            },
          },
          specialization: {
            label: "NMIMS MCA Cloud Computing context",
            dataset: {
              pageType: "specialization",
              pageUniversitySlug: "nmims",
              pageEntitySlug: "nmims-mca-cloud-computing",
            },
          },
        };
        const params = new URLSearchParams(window.location.search);
        const legacyName = params.get("context") === "home" ? "homepage" : params.get("context");
        const requested = params.get("scenario") || legacyName || "homepage";
        const scenarioName = Object.prototype.hasOwnProperty.call(scenarios, requested)
          ? requested
          : "homepage";
        const scenario = scenarios[scenarioName];
        const selected = document.querySelector(
          `input[name="scenario"][value="${scenarioName}"]`,
        );
        if (selected) selected.checked = true;
        document.getElementById("scenario-context").textContent = scenario.label;

        document.getElementById("scenario-switcher").addEventListener("change", (event) => {
          const input = event.target.closest('input[name="scenario"]');
          if (!input || !input.checked || input.value === scenarioName) return;
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.delete("context");
          nextUrl.searchParams.set("scenario", input.value);
          window.location.assign(nextUrl.href);
        });

        const embed = document.createElement("script");
        embed.src = "/widget.js";
        embed.dataset.siteKey = "degreebaba";
        embed.dataset.autoOpen = "true";
        Object.assign(embed.dataset, scenario.dataset);
        document.body.appendChild(embed);
      })();
    </script>
  </body>
</html>
